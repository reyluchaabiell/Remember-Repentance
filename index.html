<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remember Repentance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Remember Repentance Before You Regret It</h1>

<div>
    <input type="number" id="ageInput" placeholder="Masukkan umurmu" min="0" max="120">
    <button onclick="calculateLife()">Hitung Sisa Waktu</button>
</div>

<div id="result"></div>

<script>
function calculateLife() {
    var age = document.getElementById("ageInput").value;
    if (age === "" || age < 0 || age > 120) {
        alert("Tolong masukkan umur yang valid!");
        return;
    }
    var yearsLeft = 72 - age;
    var daysLeft = yearsLeft * 365;
    var weeksLeft = yearsLeft * 52;
    var monthsLeft = yearsLeft * 12;

    var message = "Kamu punya " + daysLeft + " hari, " + weeksLeft + " minggu, dan " + monthsLeft + " bulan tersisa. <br><br>Gunakan waktumu dengan baik dan ingat untuk bertaubat sebelum menyesal!";
    document.getElementById("result").innerHTML = message;
}
</script>

</body>
</html>
